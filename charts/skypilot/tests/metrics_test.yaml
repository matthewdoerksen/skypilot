# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: prometheus_extra_scrape_configs_test
templates:
  - charts/prometheus/templates/cm.yaml
tests:
  - it: should render extraScrapeConfigs with resolved service target
    set:
      prometheus.enabled: true
      prometheus.useDedicatedScrapeConfig: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["prometheus.yml"]
          pattern: "RELEASE-NAME-api-service\\.NAMESPACE\\.svc\\.cluster\\.local:9090"

  - it: should render extraScrapeConfigs using fullnameOverride for service name
    set:
      prometheus.enabled: true
      prometheus.useDedicatedScrapeConfig: true
      fullnameOverride: custom-name
      prometheus.fullnameOverride: custom-name
    asserts:
      - hasDocuments:
          count: 1
      - matchRegex:
          path: data["prometheus.yml"]
          pattern: "custom-name-api-service\\.NAMESPACE\\.svc\\.cluster\\.local:9090"

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: grafana_ingress_annotations_test
templates:
  - templates/grafana-ingress.yaml
tests:
  - it: should render custom annotations when grafana.ingress.annotations is set
    set:
      ingress:
        unified: false
      grafana:
        enabled: true
        ingress:
          enableAuthedIngress: true
          ingressClassName: nginx
          annotations:
            example.com/foo: "bar"
            example.com/baz: "qux"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Ingress
      - equal:
          path: metadata.annotations["example.com/foo"]
          value: "bar"
      - equal:
          path: metadata.annotations["example.com/baz"]
          value: "qux"

  - it: should use default auth-url and route oauth2 on Grafana ingress when ingress oauth2-proxy is enabled
    set:
      ingress:
        unified: false
        enabled: true
        oauth2-proxy:
          enabled: true
          use-https: true
          oidc-issuer-url: "https://example.okta.com/oauth2/default"
          client-id: "test-client-id"
          client-secret: "test-client-secret"
      grafana:
        enabled: true
        ingress:
          enableAuthedIngress: true
          ingressClassName: nginx
          path: "/grafana"
    asserts:
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/auth-url"]
          value: "https://$host/oauth2/auth"
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/auth-signin"]
          value: "https://$host/oauth2/start?rd=$escaped_request_uri"
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: "/oauth2"
      - equal:
          path: spec.rules[0].http.paths[1].path
          value: "/grafana"

  - it: should route oauth2 on Grafana ingress when auth.oauth is enabled
    set:
      ingress:
        unified: false
      auth:
        oauth:
          enabled: true
          use-https: true
          oidc-issuer-url: "https://example.okta.com/oauth2/default"
          client-id: "test-client-id"
          client-secret: "test-client-secret"
      grafana:
        enabled: true
        ingress:
          enableAuthedIngress: true
          ingressClassName: nginx
    asserts:
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/auth-url"]
          value: "https://$host/oauth2/auth"
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: "/oauth2"
