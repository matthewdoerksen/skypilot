{{- if and (not .Values.ingress.unified) .Values.grafana.enabled .Values.grafana.ingress.enableAuthedIngress }}
{{- $fullName := include "skypilot.fullname" . -}}
{{- $oauth2IngressAuth := or .Values.auth.oauth.enabled (and .Values.ingress.enabled (index .Values.ingress "oauth2-proxy" "enabled")) -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-grafana-authed
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- if or .Values.auth.oauth.enabled (and .Values.ingress.enabled (index .Values.ingress "oauth2-proxy" "enabled")) }}
    # OAuth2 Proxy authentication for browser-based access
    {{- $oauth2 := .Values.auth.oauth -}}
    {{- if not .Values.auth.oauth.enabled -}}
    {{- $oauth2 = index .Values.ingress "oauth2-proxy" -}}
    {{- end }}
    nginx.ingress.kubernetes.io/auth-signin: {{ if index $oauth2 "use-https" | default false }}https{{ else }}http{{ end }}://$host/oauth2/start?rd=$escaped_request_uri
    nginx.ingress.kubernetes.io/auth-url: {{ include "skypilot.nginxOauth2ProxyAuthURL" (dict "root" . "oauth2" $oauth2) }}
    nginx.ingress.kubernetes.io/auth-response-headers: {{ index .Values.grafana "grafana.ini" "auth.proxy" "header_name" }}
    {{- else }}
    # Basic authentication
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-realm: "SkyPilot API Server"
    nginx.ingress.kubernetes.io/auth-secret: {{ .Values.ingress.authSecret | default (printf "%s-basic-auth" $fullName) }}
    {{- end }}
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-WEBAUTH-USER admin;
    {{- if .Values.grafana.ingress.annotations }}
    {{- toYaml .Values.grafana.ingress.annotations | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.grafana.ingress.ingressClassName }}
  rules:
  - {{- if .Values.ingress.host }}
    host: {{ .Values.ingress.host | quote }}
    {{- end }}
    http:
      paths:
      {{- if $oauth2IngressAuth }}
      - path: /oauth2
        pathType: Prefix
        backend:
          service:
            name: {{ $fullName }}-oauth2-proxy
            port:
              number: 4180
      {{- end }}
      - backend:
          service:
            name: {{ $fullName }}-grafana
            port:
              number: 80
        path: {{ .Values.grafana.ingress.path }}
        pathType: Prefix
{{- end}}
